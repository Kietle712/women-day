<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow:hidden;
}

/* tim ban đầu */

#startHeart{
position:absolute;
font-size:110px;
cursor:pointer;
animation:pulse 1s infinite;
z-index:10;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* vùng nổ */

#heartExplosion{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999;
}

/* mảnh tim lớn */

.bigHeart{
position:absolute;
font-size:120px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
transition:transform 1.2s ease-out, opacity 1.5s;
will-change: transform;
}

/* fade */

.fadeOut{
opacity:0;
transition:opacity 1s;
}

/* container phong bì */

.container{
position:relative;
width:360px;
height:240px;
opacity:0;
transform:scale(0.8);
transition:1s;
pointer-events:none;
cursor:pointer;
}

.container.show{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* phong bì */

.envelope{
width:360px;
height:240px;
background:white;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
position:absolute;
overflow:hidden;
}

.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#f45b69;
clip-path:polygon(0 0,100% 0,50% 60%);
}

/* thư */

.letter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:330px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
text-align:center;
transition:0.5s;
}

.letter.show{
transform:translate(-50%,-50%) scale(1);
}

h2{
color:#f45b69;
margin-top:0;
}

.gif{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #f45b69;
margin:10px 0;
}

/* tim nổ từ phong bì */

.piece{
position:absolute;
font-size:26px;
}

.fly{
animation:explode 1s forwards;
}

@keyframes explode{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(1.8) rotate(720deg);
opacity:1;
}
}

/* tim bay romantic */

.heart{
position:absolute;
font-size:30px;
pointer-events:none;
animation:fly 2.5s linear forwards;
}

@keyframes fly{
0%{
opacity:1;
transform:translate(0,0) scale(1);
}
100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(1.6);
}
}

</style>
</head>

<body>

<div id="heartExplosion"></div>

<div id="startHeart">❤️</div>

<div class="container" id="container" onclick="openLetter()">

<div class="envelope" id="envelope">
<div class="flap"></div>
</div>

<div class="letter" id="letter">

<h2>🌷 Happy Women's Day 🌷</h2>

<img src="gif1.gif" class="gif">

<p>To my FRIEND!!!!!</p>

<p>
Thanks for being such a great friend.
You make every day more fun and brighter.
Wishing you lots of happiness and smiles.
</p>

<p>Lucky to have you as my friend</p>
</div>

</div>

<script>

let startHeart=document.getElementById("startHeart")
let container=document.getElementById("container")
let opened=false

startHeart.onclick=function(){

startHeart.style.display="none"

let explosion=document.getElementById("heartExplosion")

let maxRadius=Math.max(window.innerWidth,window.innerHeight)*3

let hearts=[]

/* nổ tim (giảm số lượng để mượt) */

for(let i=0;i<280;i++){

let heart=document.createElement("div")
heart.className="bigHeart"
heart.innerHTML="❤️"

explosion.appendChild(heart)
hearts.push(heart)

let x=(Math.random()-0.5)*maxRadius
let y=(Math.random()-0.5)*maxRadius

setTimeout(()=>{
heart.style.transform=
`translate(-50%,-50%) translate(${x}px,${y}px)`
},10)

}

/* phủ màn hình */

setTimeout(()=>{

hearts.forEach(h=>{

h.style.left=Math.random()*window.innerWidth+"px"
h.style.top=Math.random()*window.innerHeight+"px"
h.style.transform="translate(-50%,-50%) scale(1.2)"

})

},900)

/* fade */

setTimeout(()=>{
explosion.classList.add("fadeOut")
},1500)

/* hiện phong bì */

setTimeout(()=>{
explosion.style.display="none"
container.classList.add("show")
},2300)

}

/* mở thư */

function openLetter(){

if(opened) return
opened=true

let envelope=document.getElementById("envelope")
let rect=envelope.getBoundingClientRect()

envelope.style.opacity=0

/* tim nổ từ phong bì */

for(let i=0;i<120;i++){

let heart=document.createElement("div")
heart.className="piece"
heart.innerHTML="❤️"

heart.style.left=(rect.left+rect.width/2)+"px"
heart.style.top=(rect.top+rect.height/2)+"px"

let angle=Math.random()*Math.PI*2
let radius=300+Math.random()*200

let x=Math.cos(angle)*radius
let y=Math.sin(angle)*radius

heart.style.setProperty("--x",x+"px")
heart.style.setProperty("--y",y+"px")

document.body.appendChild(heart)

setTimeout(()=>{
heart.classList.add("fly")
},10)

setTimeout(()=>{
heart.remove()
},2000)

}

/* hiện thư */

setTimeout(()=>{
document.getElementById("letter").classList.add("show")
},600)

/* tim bay romantic */

for(let i=0;i<70;i++){

setTimeout(()=>{

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

let angle=Math.random()*Math.PI*2
let radius=350+Math.random()*250

let x=Math.cos(angle)*radius
let y=Math.sin(angle)*radius

heart.style.left=window.innerWidth/2+"px"
heart.style.top=window.innerHeight/2+"px"

heart.style.setProperty("--x",x+"px")
heart.style.setProperty("--y",y+"px")

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),2500)

},i*20)

}

}

</script>

</body>

</html>
